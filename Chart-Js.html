<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulação Gráficos</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <main style="display: flex;">
        <div style="width: 50%;">
            <canvas id="temperaturaUmidade"></canvas>
        </div>
        <div style="width: 50%;">
            <canvas id="temperaturaUmidadeMedia"></canvas>
        </div>
    </main>
</body>

<script>
    var labels_horario = [
        '12:00	',
        '13:00	',
        '14:00	',
        '15:00	',
        '16:00	',
        '17:00	',
    ];


    const graficoTempUmidade = document.getElementById('temperaturaUmidade');

    new Chart(graficoTempUmidade, {
        type: 'line',
        data: {
            labels: labels_horario,
            datasets: [{
                label: 'Temperatura',
                data: [30, 29, 28, 25, 22, 23],
                borderWidth: 1,
                borderColor: 'BLUE',
                backgroundColor: 'BLUE'
            },
            {
                label: 'Umidade',
                data: [60, 65, 62, 70, 75, 80], 
                borderWidth: 1,
                borderColor: 'RED', 
                backgroundColor: 'RED'
            }
        
        ]
        },
        options: {
            scales: {
                y: {
                    beginAtZero: true
                }
            }
        }
    });

    var labels_mes = [
        'Janeiro',
        'Fevereiro',
        'Março',
        'Abril',
        'Maio',
        'Junho',
    ];

    const graficoTempUmidadeMedia = document.getElementById('temperaturaUmidadeMedia');

    new Chart(graficoTempUmidadeMedia, {
        type: 'bar',
        data: {
            labels: labels_mes,
            datasets: [{
                label: 'Temperatura',
                data: [22, 24, 27, 23, 20, 18],
                borderWidth: 1,
                borderColor: 'BLUE',
                backgroundColor: 'BLUE'
            },
            {
                label: 'Umidade',
                data: [90, 89, 93, 87, 88, 88], 
                borderWidth: 1,
                borderColor: 'RED', 
                backgroundColor: 'RED'
            }
        
        ]
        },
        options: {
            scales: {
                y: {
                    beginAtZero: true
                }
            }
        }
    });

</script>

</html>
